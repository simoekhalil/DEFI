name: E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 2 AM UTC to catch any issues with the live site
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download MetaMask extension
        run: npm run metamask:download

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify secrets are set
        run: |
          if [ -z "$METAMASK_PRIVATE_KEY" ]; then
            echo "❌ ERROR: METAMASK_PRIVATE_KEY is not set!"
            echo "Please add it as a repository secret:"
            echo "Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          else
            echo "✅ METAMASK_PRIVATE_KEY is set (length: ${#METAMASK_PRIVATE_KEY})"
          fi
        env:
          METAMASK_PRIVATE_KEY: ${{ secrets.METAMASK_PRIVATE_KEY }}

      - name: Run E2E tests
        env:
          CI: true
          METAMASK_PRIVATE_KEY: ${{ secrets.METAMASK_PRIVATE_KEY }}
          # Optional: Add custom network if needed
          # RPC_URL: ${{ secrets.RPC_URL }}
          # CHAIN_ID: ${{ secrets.CHAIN_ID }}
          # CHAIN_NAME: ${{ secrets.CHAIN_NAME }}
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ E2E tests failed. Please check the [test results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })
