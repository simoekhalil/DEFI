name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps

    - name: Download MetaMask extension
      run: npm run metamask:download

    - name: Create .env file
      run: |
        echo "BASE_URL=${{ secrets.BASE_URL || 'https://lpad-frontend-dev1.defi.gala.com' }}" > .env
        echo "METAMASK_PRIVATE_KEY=${{ secrets.METAMASK_PRIVATE_KEY }}" >> .env
        if [ -n "${{ secrets.RPC_URL }}" ]; then
          echo "RPC_URL=${{ secrets.RPC_URL }}" >> .env
        fi
        if [ -n "${{ secrets.CHAIN_ID }}" ]; then
          echo "CHAIN_ID=${{ secrets.CHAIN_ID }}" >> .env
        fi
        if [ -n "${{ secrets.CHAIN_NAME }}" ]; then
          echo "CHAIN_NAME=${{ secrets.CHAIN_NAME }}" >> .env
        fi
        if [ -n "${{ secrets.CHAIN_SYMBOL }}" ]; then
          echo "CHAIN_SYMBOL=${{ secrets.CHAIN_SYMBOL }}" >> .env
        fi

    - name: Verify environment configuration
      run: |
        if [ -z "${{ secrets.METAMASK_PRIVATE_KEY }}" ]; then
          echo "❌ METAMASK_PRIVATE_KEY secret not set!"
          echo "Please add it in Repository Settings → Secrets → Actions"
          exit 1
        fi
        echo "✅ Environment configured successfully"

    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        CI: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ Playwright tests failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
          })

